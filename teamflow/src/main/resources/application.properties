
# App config
spring.application.name=teamflow
server.port=8081

# SQL Server connection
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=teamflow;encrypt=true;trustServerCertificate=true
spring.datasource.username=teamflow_user
spring.datasource.password=TeamFlow@123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true